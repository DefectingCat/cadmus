# .air.toml - Go server hot reload configuration
# Per docs/design.md Section 11.2

root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/main"
cmd = "go build -o ./tmp/main ./cmd/server"
delay = 1000
exclude_dir = ["tmp", "vendor", "web/frontend/node_modules", "web/static"]
exclude_file = ["*_templ.go"]  # templ generated files
include_ext = ["go", "templ"]
kill_delay = "2s"

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"